<!DOCTYP<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="sMe9o4ndrTx6bFdakgRATCmT9e8IM5l1mKq9bZbx1xE" />
    <title>Dody App</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .chat-container { max-width: 600px; margin: 20px auto; background-color: #1e293b; border-radius: 15px; padding: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .chat-box { height: 300px; background-color: #0f172a; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #334155; text-align: right; }
        .message-entry { margin-bottom: 12px; padding: 8px; border-radius: 8px; background-color: #1e293b; border-right: 4px solid #fbbf24; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background-color: #334155; color: white; font-size: 1rem; }
        .btn-send { background-color: #fbbf24; color: #0f172a; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .roles-footer { marginTop: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn-role { border: none; padding: 10px 20px; border-radius: 20px; fontWeight: bold; cursor: pointer; color: white; }
        .role-display { display: inline-block; padding: 5px 15px; border-radius: 20px; background-color: #334155; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1 style="color: #fbbf24; fontSize: 2.2rem; margin: 0;">👑 Dody App 👑</h1>
        <p style="color: #94a3b8; margin: 5px 0;">Secure Verified Chat Room</p>
        <div class="role-display">
            Role: <span id="current-role" style="color: #fbbf24; font-weight: bold;">User</span>
        </div>
    </header>

    <main class="chat-container">
        <div class="chat-box" id="chat-stream">
            <div style="color: #64748b; text-align: center; margin-top: 120px;" id="empty-notice">No new messages since you joined...</div>
        </div>

        <div class="input-area">
            <input type="text" id="text-input" placeholder="Type your message here..." />
            <button class="btn-send" onclick="handleSend()">Send</button>
        </div>
    </main>

    <footer class="roles-footer">
        <button class="btn-role" onclick="updateRole('Star 🌟', '#ec4899')" style="background-color: #ec4899;">Star</button>
        <button class="btn-role" onclick="updateRole('Influencer ✨', '#06b6d4')" style="background-color: #06b6d4;">Influencer</button>
        <button class="btn-role" onclick="updateRole('Admin 🛡️', '#ef4444')" style="background-color: #ef4444;">Admin</button>
    </footer>
    
    <p style="margin-top: 40px; font-size: 0.8rem; color: #475569;">Verified by Google Search Console ✅</p>

    <script>
        let currentRoleName = "User";

        function updateRole(roleName, color) {
            currentRoleName = roleName;
            const display = document.getElementById('current-role');
            display.innerText = roleName;
            display.style.color = color;
        }

        function handleSend() {
            const input = document.getElementById('text-input');
            const stream = document.getElementById('chat-stream');
            const notice = document.getElementById('empty-notice');
            
            if (input.value.trim() !== "") {
                if (notice) notice.remove();
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message-entry';
                msgDiv.innerHTML = `<span style="color: #fbbf24; font-weight: bold;">[${currentRoleName}] You: </span><span style="color: white;">${input.value}</span>`;
                
                stream.appendChild(msgDiv);
                stream.scrollTop = stream.scrollHeight;
                input.value = "";
            }
        }
    </script>
</body>
</html>
