<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دودي - الدردشة العربية</title>
    <meta name="description" content="تطبيق دودي للدردشة الذكية، رفيقك في الحوار والذكاء الاصطناعي">
    <link rel="icon" type="image/png" href="https://i.ibb.co/Lzn4PZk/image-5.png">
    
    <!-- كود توثيق ملكية جوجل الجديد -->
    <meta name="google-site-verification" content="BwY1Cp_orTKV8ToG2oCUdav6gFQweE5SPBSsaxl6kd0">
    
    <!-- كود إعادة التوجيه التلقائي إلى رابط الاستضافة الخاص بك -->
    <meta http-equiv="refresh" content="0; url=https://hostingapp.io">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            color: white;
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #fbbf24;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- دائرة التحميل التي تظهر للمستخدم قبل الانتقال للتطبيق -->
    <div class="loader"></div>
</body>
