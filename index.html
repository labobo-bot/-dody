<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دودي - دردشة ذكية</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/Lzn4PZk/image-5.png">
    
    <meta name="google-site-verification" content="0GMcBBM3dZLaVgs3BS272g61EBw8YF_8ZfBBteDKODQ" />

    <meta http-equiv="refresh" content="0; url=https://ais-pre-mjmes2bnjlrr3eeust5nss-737817258666.europe-west2.run.app/">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-right: 15px;">جاري الانتقال إلى تطبيق دودي...</p>
</body>
